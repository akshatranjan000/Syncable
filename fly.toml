app = "sync-server-old-violet-1509"
primary_region = "bom"

[build]
  dockerfile = "server/dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
  memory_mb = 512
